<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-news Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #F5F6FA;
      color: #1a2744;
      min-height: 100vh;
    }

    /* ---- Login ---- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,255,.06);
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0052CC;
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dde1ea;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 14px;
    }
    .login-card input:focus { border-color: #0052CC; }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #0052CC;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #0040a0; }
    #login-error {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    /* ---- Dashboard ---- */
    #dashboard { display: none; }

    header {
      background: #0052CC;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    #logout-btn {
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #fff;
      border-bottom: 1.5px solid #e4e7f0;
      padding: 0 16px;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 14px 18px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #0052CC;
      border-bottom-color: #0052CC;
      font-weight: 700;
    }

    .tab-panel { display: none; padding: 24px 16px; }
    .tab-panel.active { display: block; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      margin-bottom: 18px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a2744;
    }

    /* ---- Stats cards ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 0;
    }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #0052CC;
      line-height: 1;
    }
    .stat-sub {
      font-size: 11px;
      color: #aaa;
    }

    /* ---- Tables ---- */
    .tbl-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1.5px solid #e4e7f0;
      color: #888;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 10px;
      border-bottom: 1px solid #f0f2f8;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f7f9ff; }

    /* ---- Search row ---- */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-row input {
      flex: 1;
      padding: 10px 13px;
      border: 1.5px solid #dde1ea;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .search-row input:focus { border-color: #0052CC; }

    /* ---- Misc ---- */
    .loading {
      text-align: center;
      padding: 32px;
      color: #aaa;
      font-size: 14px;
    }
    .empty {
      text-align: center;
      padding: 32px;
      color: #bbb;
      font-size: 14px;
    }

    /* ---- Export Panel ---- */
    .export-panel {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      margin: 16px 16px 0;
    }
    .export-panel .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a2744;
      border-bottom: 1.5px solid #e4e7f0;
      padding-bottom: 12px;
    }
    .export-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 14px;
    }
    .export-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .export-field label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    .export-field select,
    .export-field input[type="date"] {
      padding: 8px 12px;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: #1a2744;
      min-width: 130px;
    }
    .export-field select:focus,
    .export-field input[type="date"]:focus { border-color: #0052CC; }
    .export-columns {
      margin-bottom: 14px;
    }
    .export-columns label.col-label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    .col-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .col-checkboxes label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #1a2744;
      background: #f5f6fa;
      border: 1.5px solid #e4e7f0;
      border-radius: 7px;
      padding: 5px 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
    .col-checkboxes label:hover { border-color: #0052CC; background: #eef3ff; }
    .col-checkboxes input[type="checkbox"] { accent-color: #0052CC; }
    .btn-export {
      padding: 10px 22px;
      background: #0052CC;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-export:hover { background: #0040a0; }

    @media (max-width: 480px) {
      .tab-btn { padding: 12px 10px; font-size: 13px; }
      .card { padding: 14px; }
      .export-panel { margin: 10px 10px 0; padding: 14px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>J-news Admin</h1>
    <p>운영자 전용 대시보드</p>
    <input type="password" id="key-input" placeholder="관리자 키 입력" autocomplete="current-password">
    <button class="btn-primary" onclick="login()">로그인</button>
    <p id="login-error">키가 올바르지 않습니다.</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <h1>J-news Admin</h1>
    <button id="logout-btn" onclick="logout()">로그아웃</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('stats')">통계</button>
    <button class="tab-btn" onclick="switchTab('users')">유저</button>
    <button class="tab-btn" onclick="switchTab('reviews')">리뷰</button>
  </div>

  <!-- 통계 탭 -->
  <div id="tab-stats" class="tab-panel active">
    <div id="stats-content" class="loading">불러오는 중...</div>
  </div>

  <!-- 유저 탭 -->
  <div id="tab-users" class="tab-panel">
    <div class="card">
      <div class="card-title">전체 유저</div>
      <div class="search-row" style="margin-bottom:14px;">
        <input type="text" id="user-search" placeholder="UID 검색" oninput="filterUsers()">
      </div>
      <div id="users-content" class="loading">불러오는 중...</div>
    </div>
  </div>

  <!-- 리뷰 탭 -->
  <div id="tab-reviews" class="tab-panel">
    <div class="card">
      <div class="card-title">앱 리뷰</div>
      <div id="reviews-content" class="loading">불러오는 중...</div>
    </div>
  </div>

  <!-- 내보내기 패널 -->
  <div class="export-panel">
    <div class="card-title">데이터 내보내기</div>
    <div class="export-row">
      <div class="export-field">
        <label>데이터 종류</label>
        <select id="export-type" onchange="onExportTypeChange()">
          <option value="users">유저 현황</option>
          <option value="reviews">리뷰</option>
        </select>
      </div>
      <div class="export-field">
        <label>날짜 시작</label>
        <input type="date" id="export-date-from">
      </div>
      <div class="export-field">
        <label>날짜 종료</label>
        <input type="date" id="export-date-to">
      </div>
    </div>
    <div class="export-columns">
      <label class="col-label">컬럼 선택</label>
      <div id="col-checkboxes" class="col-checkboxes"></div>
    </div>
    <button class="btn-export" onclick="downloadCsv()">CSV 다운로드</button>
  </div>
</div>

<script>
  const BASE = 'https://backend-ruby-chi-85.vercel.app';
  let adminKey = '';
  let allUsersData = [];
  const TAB_NAMES = ['stats', 'users', 'reviews'];

  /* ---------- Auth ---------- */
  async function login() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;

    const res = await fetch(`${BASE}/api/admin?action=stats&key=${encodeURIComponent(key)}`);
    if (res.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    document.getElementById('login-error').style.display = 'none';
    adminKey = key;
    sessionStorage.setItem('adminKey', key);
    showDashboard();
    loadStats();
  }

  function logout() {
    adminKey = '';
    sessionStorage.removeItem('adminKey');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('key-input').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  /* ---------- Tabs ---------- */
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TAB_NAMES[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');

    if (name === 'stats')   loadStats();
    if (name === 'users')   loadUsers();
    if (name === 'reviews') loadReviews();
  }

  /* ---------- Helpers ---------- */
  function apiUrl(params) {
    return `${BASE}/api/admin?key=${encodeURIComponent(adminKey)}&${params}`;
  }

  function shortId(id) {
    return id ? id.slice(0, 8) : '-';
  }

  function fmtDate(dt) {
    if (!dt) return '-';
    return String(dt).replace('T', ' ').slice(0, 16);
  }

  /* ---------- Stats ---------- */
  async function loadStats() {
    const el = document.getElementById('stats-content');
    el.innerHTML = '<div class="loading">불러오는 중...</div>';
    try {
      const res = await fetch(apiUrl('action=stats'));
      const d = await res.json();
      if (d.detail) {
        el.innerHTML = `<div class="empty">오류: ${d.detail}</div>`;
        return;
      }
      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">총 유저</div>
            <div class="stat-value">${(d.total_users ?? 0).toLocaleString()}</div>
            <div class="stat-sub">오늘 신규 +${d.new_users_today ?? 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 뉴스</div>
            <div class="stat-value">${(d.total_news ?? 0).toLocaleString()}</div>
            <div class="stat-sub">오늘 생성 +${d.new_news_today ?? 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">앱 리뷰</div>
            <div class="stat-value">${(d.total_reviews ?? 0).toLocaleString()}</div>
            <div class="stat-sub">누적 제출 수</div>
          </div>
        </div>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    }
  }

  /* ---------- Users ---------- */
  async function loadUsers() {
    const el = document.getElementById('users-content');
    el.innerHTML = '<div class="loading">불러오는 중...</div>';
    try {
      const res = await fetch(apiUrl('action=users'));
      const data = await res.json();
      allUsersData = Array.isArray(data) ? data : [];
      renderUsers(allUsersData);
    } catch (e) {
      el.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    }
  }

  function filterUsers() {
    const q = document.getElementById('user-search').value.trim().toLowerCase();
    const filtered = q
      ? allUsersData.filter(u => (u.id || '').toLowerCase().includes(q))
      : allUsersData;
    renderUsers(filtered);
  }

  function renderUsers(data) {
    const el = document.getElementById('users-content');
    if (!data.length) {
      el.innerHTML = '<div class="empty">유저 데이터가 없습니다.</div>';
      return;
    }
    el.innerHTML = `
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>플랫폼</th>
              <th>출석 스트릭</th>
              <th>가입일</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(u => `
              <tr>
                <td title="${u.id}">${shortId(u.id)}</td>
                <td>${u.platform || '-'}</td>
                <td>${u.streak_count ?? 0}일</td>
                <td>${fmtDate(u.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  /* ---------- Reviews ---------- */
  async function loadReviews() {
    const el = document.getElementById('reviews-content');
    el.innerHTML = '<div class="loading">불러오는 중...</div>';
    try {
      const res = await fetch(apiUrl('action=reviews'));
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) {
        el.innerHTML = '<div class="empty">리뷰 데이터가 없습니다.</div>';
        return;
      }
      el.innerHTML = `
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>UID</th>
                <th>내용</th>
                <th>날짜</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(r => `
                <tr>
                  <td>${r.id}</td>
                  <td title="${r.user_id}">${shortId(r.user_id)}</td>
                  <td style="max-width:300px;word-break:break-word;">${r.review_text || '-'}</td>
                  <td>${fmtDate(r.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (e) {
      el.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
    }
  }

  /* ---------- Export ---------- */
  const COLUMN_LABELS = {
    users: {
      id: '사용자ID',
      streak_count: '출석스트릭',
      platform: '플랫폼',
      created_at: '가입일',
    },
    reviews: {
      id: '번호',
      user_id: '사용자ID',
      review_text: '리뷰내용',
      created_at: '날짜',
    },
  };

  function onExportTypeChange() {
    const type = document.getElementById('export-type').value;
    renderColCheckboxes(type);
  }

  function renderColCheckboxes(type) {
    const labels = COLUMN_LABELS[type] || {};
    const container = document.getElementById('col-checkboxes');
    container.innerHTML = Object.entries(labels).map(([key, label]) => `
      <label>
        <input type="checkbox" class="col-cb" value="${key}" checked>
        ${label}
      </label>
    `).join('');
  }

  function downloadCsv() {
    const type = document.getElementById('export-type').value;
    const dateFrom = document.getElementById('export-date-from').value;
    const dateTo = document.getElementById('export-date-to').value;
    const checked = Array.from(document.querySelectorAll('.col-cb:checked')).map(cb => cb.value);

    if (checked.length === 0) {
      alert('최소 하나의 컬럼을 선택하세요.');
      return;
    }

    let qs = `action=export&type=${encodeURIComponent(type)}`;
    qs += `&columns=${encodeURIComponent(checked.join(','))}`;
    if (dateFrom) qs += `&date_from=${encodeURIComponent(dateFrom)}`;
    if (dateTo) qs += `&date_to=${encodeURIComponent(dateTo)}`;

    window.location.href = apiUrl(qs);
  }

  /* 페이지 로드 시 초기화 */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('adminKey');
    if (saved) {
      adminKey = saved;
      showDashboard();
      loadStats();
    }
    document.getElementById('key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    renderColCheckboxes('users');
  });
</script>
</body>
</html>
